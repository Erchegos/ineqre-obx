name: AIS Vessel Positions

on:
  schedule:
    # Run twice daily: 06:00 UTC (morning) and 14:00 UTC (afternoon)
    # AISStream WebSocket collects for 5 minutes, then writes to DB.
    # Digitraffic (free, no auth) runs as fallback for any missed vessels.
    - cron: '0 6 * * *'
    - cron: '0 14 * * *'
  workflow_dispatch:
    inputs:
      duration:
        description: 'AISStream listen duration (seconds)'
        default: '300'
        required: false
      skip_aisstream:
        description: 'Skip AISStream (use Digitraffic only)'
        type: boolean
        default: false
      skip_digitraffic:
        description: 'Skip Digitraffic fallback'
        type: boolean
        default: false

jobs:
  ais-positions:
    name: Fetch AIS Vessel Positions
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Create env file
        working-directory: apps/web
        run: |
          echo 'DATABASE_URL="${{ secrets.DATABASE_URL }}"' > .env.local
          echo 'AISSTREAM_API_KEY="${{ secrets.AISSTREAM_API_KEY }}"' >> .env.local
          echo 'BARENTSWATCH_CLIENT_ID="${{ secrets.BARENTSWATCH_CLIENT_ID }}"' >> .env.local
          echo 'BARENTSWATCH_CLIENT_SECRET="${{ secrets.BARENTSWATCH_CLIENT_SECRET }}"' >> .env.local

      # ─── Step 1: AISStream.io (global, WebSocket) ────────────────────
      # 94 fleet MMSIs in 2 batches × 300s each = ~10 min total.
      # Followed by BarentsWatch + Digitraffic within 30-min budget.
      - name: "Step 1: AISStream.io global positions"
        if: ${{ github.event.inputs.skip_aisstream != 'true' }}
        working-directory: apps/web
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AISSTREAM_API_KEY: ${{ secrets.AISSTREAM_API_KEY }}
          NODE_TLS_REJECT_UNAUTHORIZED: '0'
        run: |
          DURATION="${{ github.event.inputs.duration || '300' }}"
          npx tsx scripts/fetch-ais-positions.ts --duration=$DURATION
        continue-on-error: true

      # ─── Step 2: BarentsWatch Open AIS (Norwegian waters) ────────────
      # Free Norwegian government AIS — North Sea, Norwegian Sea, Barents.
      # Covers SOFF, DOFG, HAVI offshore vessels + tankers transiting North Sea.
      # Hard-capped at 10 min via `timeout` — saves partial results and continues.
      - name: "Step 2: BarentsWatch (Norwegian waters)"
        working-directory: apps/web
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BARENTSWATCH_CLIENT_ID: ${{ secrets.BARENTSWATCH_CLIENT_ID }}
          BARENTSWATCH_CLIENT_SECRET: ${{ secrets.BARENTSWATCH_CLIENT_SECRET }}
          NODE_TLS_REJECT_UNAUTHORIZED: '0'
        run: timeout 600 npx tsx scripts/fetch-vesselfinder-positions.ts || true
        continue-on-error: true

      # ─── Step 3: Digitraffic (North Sea / Baltic) ────────────────────
      # Finnish Transport Agency AIS — supplements BarentsWatch for Baltic.
      - name: "Step 3: Digitraffic fallback (North Sea / Baltic)"
        if: ${{ github.event.inputs.skip_digitraffic != 'true' }}
        working-directory: apps/web
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NODE_TLS_REJECT_UNAUTHORIZED: '0'
        run: npx tsx scripts/fetch-vessel-positions.ts
        continue-on-error: true

      # ─── Summary ─────────────────────────────────────────────────────
      - name: Pipeline Summary
        if: always()
        run: |
          echo "## AIS Vessel Position Update" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Source | Coverage |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| 1 | AISStream.io (WebSocket 5min/batch) | Global |" >> $GITHUB_STEP_SUMMARY
          echo "| 2 | BarentsWatch Open AIS (OAuth2) | Norwegian waters |" >> $GITHUB_STEP_SUMMARY
          echo "| 3 | Digitraffic (REST, free) | North Sea / Baltic |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Time**: $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
