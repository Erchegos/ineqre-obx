name: Intelligence Terminal Refresh

on:
  schedule:
    # All times UTC — Oslo is CET (UTC+1 winter) / CEST (UTC+2 summer)
    #
    # 1) 07:30 UTC = 08:30 CET — before OSE open: overnight filings + FX + commodities
    - cron: '30 7 * * 1-5'
    # 2) 08:15 UTC = 09:15 CET — right after OSE open: opening announcements
    - cron: '15 8 * * 1-5'
    # 3) 10:30 UTC = 11:30 CET — midday catch-up
    - cron: '30 10 * * 1-5'
    # 4) 15:00 UTC = 16:00 CET — before close: late-day filings
    - cron: '0 15 * * 1-5'
    # 5) 15:45 UTC = 16:45 CET — after OSE close: full refresh (all sources)
    - cron: '45 15 * * 1-5'
  workflow_dispatch:
    inputs:
      days:
        description: 'Days of NewsWeb history to fetch'
        type: string
        default: '2'

# Prices are handled by price-hourly.yml (every hour 09:00-17:00 CET)

jobs:
  intel-refresh:
    name: NewsWeb + Shorts + FX + Commodities
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Create env file
        working-directory: apps/web
        run: |
          echo 'DATABASE_URL="${{ secrets.DATABASE_URL }}"' > .env.local

      # ─── NewsWeb regulatory filings (every run) ────────────────────────
      - name: Fetch NewsWeb filings
        working-directory: apps/web
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NODE_TLS_REJECT_UNAUTHORIZED: '0'
        run: |
          DAYS="${{ github.event.inputs.days || '2' }}"
          npx tsx scripts/fetch-newsweb-filings.ts --days=$DAYS

      # ─── SSR Short Positions (after close only — SSR publishes ~15:30 CET)
      - name: Fetch short positions
        if: >-
          ${{
            github.event.schedule == '45 15 * * 1-5' ||
            github.event_name == 'workflow_dispatch'
          }}
        working-directory: apps/web
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NODE_TLS_REJECT_UNAUTHORIZED: '0'
        run: npx tsx scripts/fetch-ssr-shorts.ts

      # ─── Norges Bank FX rates (morning + after close) ──────────────────
      - name: Fetch FX rates
        if: >-
          ${{
            github.event.schedule == '30 7 * * 1-5' ||
            github.event.schedule == '45 15 * * 1-5' ||
            github.event_name == 'workflow_dispatch'
          }}
        working-directory: apps/web
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NODE_TLS_REJECT_UNAUTHORIZED: '0'
        run: npx tsx scripts/fetch-fx-norgesbank.ts --days=7

      # ─── Commodities (morning for US close data + after OSE close) ─────
      - name: Fetch commodity prices
        if: >-
          ${{
            github.event.schedule == '30 7 * * 1-5' ||
            github.event.schedule == '45 15 * * 1-5' ||
            github.event_name == 'workflow_dispatch'
          }}
        working-directory: apps/web
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NODE_TLS_REJECT_UNAUTHORIZED: '0'
        run: npx tsx scripts/fetch-commodities.ts --days=7 --force

      # ─── Summary ───────────────────────────────────────────────────────
      - name: Summary
        if: always()
        run: |
          echo "## Intelligence Refresh" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Source | When |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| NewsWeb | Every run (5x/day) |" >> $GITHUB_STEP_SUMMARY
          echo "| Shorts (SSR) | 16:45 CET (after close) |" >> $GITHUB_STEP_SUMMARY
          echo "| FX (Norges Bank) | 08:30, 16:45 CET |" >> $GITHUB_STEP_SUMMARY
          echo "| Commodities | 08:30, 16:45 CET |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Schedule**: ${{ github.event.schedule || 'manual' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Time**: $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
