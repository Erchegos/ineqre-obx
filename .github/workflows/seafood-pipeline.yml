name: Seafood Email Pipeline

on:
  schedule:
    # Daily at 14:00 UTC — Fish Pool spot prices arrive on random days
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  seafood-email:
    name: Seafood Email Pipeline (Fish Pool + Pareto)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Create env file
        working-directory: apps/web
        run: |
          echo 'DATABASE_URL="${{ secrets.DATABASE_URL }}"' > .env.local
          echo 'EMAIL_USER="${{ secrets.EMAIL_USER }}"' >> .env.local
          echo 'EMAIL_PASSWORD="${{ secrets.EMAIL_PASSWORD }}"' >> .env.local
          echo 'NEXT_PUBLIC_SUPABASE_URL="${{ secrets.SUPABASE_URL }}"' >> .env.local
          echo 'SUPABASE_SERVICE_ROLE_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"' >> .env.local

      # ─── Fish Pool SISALMON Spot + Forward (via IMAP) ───────────
      - name: "Fetch Fish Pool reports (IMAP)"
        working-directory: apps/web
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          NODE_TLS_REJECT_UNAUTHORIZED: '0'
        run: npx tsx scripts/fetch-fishpool-reports.ts --weeks=4

      # ─── Pareto Seafood Weekly (from research docs in Supabase) ─
      - name: "Parse Pareto Seafood Weekly"
        working-directory: apps/web
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NODE_TLS_REJECT_UNAUTHORIZED: '0'
        run: npx tsx scripts/parse-pareto-seafood.ts --limit=5

      # ─── Summary ────────────────────────────────────────────────
      - name: Pipeline Summary
        if: always()
        run: |
          echo "## Seafood Email Pipeline" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Email-based seafood data fetches (Fish Pool IMAP + Pareto PDF parsing)." >> $GITHUB_STEP_SUMMARY
          echo "Non-email sources (SSB, BarentsWatch, biomass, ocean) run on VPS." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Time**: $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
