name: Harvest Tracker — AIS Trip Detection

on:
  schedule:
    # Every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:
    inputs:
      duration:
        description: 'Listen duration in seconds (default: 600)'
        type: number
        default: 600

jobs:
  harvest-track:
    name: AIS Position Collection & Trip Detection
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Create env file
        working-directory: apps/web
        run: |
          echo 'DATABASE_URL="${{ secrets.DATABASE_URL }}"' > .env.local
          echo 'AISSTREAM_API_KEY="${{ secrets.AISSTREAM_API_KEY }}"' >> .env.local

      - name: Run harvest tracker
        working-directory: apps/web
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AISSTREAM_API_KEY: ${{ secrets.AISSTREAM_API_KEY }}
          NODE_TLS_REJECT_UNAUTHORIZED: '0'
        run: >
          npx tsx scripts/fetch-harvest-positions.ts
          --duration=${{ github.event.inputs.duration || 1200 }}

      - name: Run quarterly aggregation
        working-directory: apps/web
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NODE_TLS_REJECT_UNAUTHORIZED: '0'
        run: npx tsx scripts/aggregate-harvest-estimates.ts

      - name: Summary
        if: always()
        run: |
          echo "## Harvest Tracker" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Duration**: ${{ github.event.inputs.duration || 600 }}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Time**: $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
