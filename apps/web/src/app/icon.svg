<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#111827"/>

  <!-- Subtle area fill under line -->
  <path d="M4,24 L10,18 L17,21 L23,13 L28,8 L28,29 L4,29Z"
    fill="rgba(255,255,255,0.06)"/>

  <!-- Clean upward trend line, white -->
  <polyline points="4,24 10,18 17,21 23,13 28,8"
    fill="none"
    stroke="rgba(255,255,255,0.92)"
    stroke-width="2.2"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- Terminal dot at peak -->
  <circle cx="28" cy="8" r="2.2" fill="white"/>
</svg>
